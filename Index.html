<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Rush by Jip & Noah</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; font-family: 'Courier New', Courier, monospace; touch-action: none; }
        canvas { display: block; }
        #landscapeMsg { display: none; position: absolute; inset: 0; background: #1a1a2e; color: white; z-index: 500; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        @media (orientation: portrait) { #landscapeMsg { display: flex; } }
        
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; z-index: 10; font-size: 14px; width: 95%; text-shadow: 1px 1px 2px black; }
        #wordDisplay { font-size: 24px; font-weight: bold; margin-bottom: 5px; letter-spacing: 5px; }
        .letter-off { color: rgba(255,255,255,0.15); }
        .letter-on { color: #f9ed69; text-shadow: 0 0 15px #f9ed69; }
        
        #bossMeterContainer { width: 150px; height: 10px; background: rgba(255,255,255,0.1); border: 1px solid white; margin-top: 5px; border-radius: 5px; overflow: hidden; }
        #bossMeterFill { height: 100%; width: 0%; background: #ff4500; }
        
        .btn { position: absolute; bottom: 25px; width: 85px; height: 85px; background: rgba(255, 255, 255, 0.2); border: 4px solid white; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; z-index: 20; user-select: none; font-size: 12px; }
        #jumpBtn { left: 25px; }
        #fireBtn { right: 25px; border-color: #ff4500; color: #ff4500; }
        
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; text-align: center; padding: 20px; }
        h1 { color: #00ff41; text-shadow: 0 0 15px #00ff41; margin: 0; }
        button { padding: 12px 35px; font-size: 20px; cursor: pointer; background: #00ff41; border: none; border-radius: 8px; font-weight: bold; margin-top: 20px; font-family: inherit; }
    </style>
</head>
<body>
    <div id="landscapeMsg"><h2>🔄 Draai je telefoon!</h2><p>Dragon Rush speel je liggend.</p></div>

    <div id="startScreen" class="overlay">
        <h1>DRAGON RUSH</h1>
        <h3 style="margin: 5px 0;">Jip & Noah Edition</h3>
        <p id="timeGreeting" style="color: #00e5ff; font-weight: bold;"></p>
        <button id="realStartBtn">START</button>
    </div>

    <div id="gameOverScreen" class="overlay" style="display: none;">
        <h1>GAME OVER</h1>
        <p style="font-size: 24px;">Score: <span id="finalScore" style="color:#00ff41;">0</span></p>
        <button id="retryBtn">OPNIEUW</button>
    </div>

    <div id="ui">
        <div id="wordDisplay"></div>
        <div>Score: <span id="score">0</span></div>
        <span>Boss Afstand:</span>
        <div id="bossMeterContainer"><div id="bossMeterFill"></div></div>
        <div id="statusLabel" style="margin-top:5px; font-weight:bold; color:#00ff41;">Draak</div>
    </div>
    
    <div id="jumpBtn" class="btn">SPRONG</div>
    <div id="fireBtn" class="btn">VUUR</div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('score'), bossMeterFill = document.getElementById('bossMeterFill');
const finalScoreElement = document.getElementById('finalScore'), statusLabel = document.getElementById('statusLabel');
const wordDisplay = document.getElementById('wordDisplay');

const targetWord = "MAARTEN";
const bossThreshold = 800;

let score, gameActive, frame, shakeAmount, animationId;
let speedMult, bulletSize, isDino, powerUpTimer, hasLaser, gameLevel, nextBossScore;
let dragon, obstacles, fruits, flames, bossFlames, boss, letterItems;
let collectedLetters = [], immortalTimer = 0;

function resize() { 
    canvas.width = window.innerWidth; 
    canvas.height = window.innerHeight; 
}
window.addEventListener('resize', resize);
resize();

function updateWordUI() {
    wordDisplay.innerHTML = targetWord.split('').map((l, i) => 
        `<span class="${collectedLetters.includes(i) ? 'letter-on' : 'letter-off'}">${l}</span>`
    ).join('');
}

function initVariables() {
    score = 0; gameActive = true; frame = 0; shakeAmount = 0;
    speedMult = 1; bulletSize = 1; isDino = false; powerUpTimer = 0; hasLaser = false; gameLevel = 1;
    nextBossScore = bossThreshold;
    dragon = { x: 80, y: 0, w: 45, h: 50, dy: 0, grav: 0.6, grounded: false, size: 1, jumpCount: 0, maxJumps: 3 };
    obstacles = []; fruits = []; flames = []; bossFlames = []; 
    letterItems = []; collectedLetters = []; immortalTimer = 0;
    boss = { active: false, x: canvas.width - 160, y: 50, w: 130, h: 130, hp: 30, maxHp: 30, dir: 1 };
    updateWordUI();
}

function handleJump() { if (gameActive && dragon.jumpCount < dragon.maxJumps) { dragon.dy = isDino ? -14 : -12; dragon.jumpCount++; dragon.grounded = false; } }
function handleFire() {
    if (!gameActive) return;
    if (hasLaser && isDino) { flames.push({ x: dragon.x + 50, y: dragon.y + 15, w: canvas.width, h: 30, type: 'laser', life: 15 }); }
    else if (dragon.size > 0.4 || isDino) { flames.push({ x: dragon.x + 50, y: dragon.y + 25, r: 12 * bulletSize, type: 'ball' }); if (!isDino) dragon.size -= 0.04; }
}

window.onkeydown = (e) => { if(e.code === 'Space') handleJump(); if(e.code === 'KeyF') handleFire(); };
document.getElementById('jumpBtn').onclick = handleJump;
document.getElementById('fireBtn').onclick = handleFire;

function applyFruit(type) {
    let oldDino = isDino; 
    speedMult = 1; bulletSize = 1; isDino = false; hasLaser = false; dragon.size = 1;
    isDino = oldDino;
    if (type === 'speed') speedMult = 1.8;
    if (type === 'big') { if(isDino) hasLaser = true; else bulletSize = 3; }
    if (type === 'dino') { isDino = true; statusLabel.innerText = "T-REX MODE"; powerUpTimer = 9999; return; }
    if (type === 'slow') speedMult = 0.5;
    powerUpTimer = 400;
}

function update() {
    if (!gameActive) return;
    frame++;
    if (frame % 60 === 0) score += (speedMult > 1) ? 2 : 1;
    if (powerUpTimer > 0) { powerUpTimer--; if (powerUpTimer === 0) { speedMult = 1; bulletSize = 1; isDino = false; statusLabel.innerText = "Draak"; } }
    if (immortalTimer > 0) { immortalTimer--; if (immortalTimer === 0) { collectedLetters = []; updateWordUI(); statusLabel.innerText = "Draak"; } }

    let ground = canvas.height - 50;
    dragon.dy += dragon.grav; dragon.y += dragon.dy;
    if (dragon.y + dragon.h > ground) { dragon.y = ground - dragon.h; dragon.dy = 0; dragon.grounded = true; dragon.jumpCount = 0; }

    if (!boss.active) {
        let progress = ((score % bossThreshold) / bossThreshold) * 100;
        bossMeterFill.style.width = progress + "%";
        if (score >= nextBossScore) { boss.active = true; boss.hp = 30 + (gameLevel * 10); boss.maxHp = boss.hp; nextBossScore += bossThreshold; obstacles = []; shakeAmount = 25; }
    } else {
        bossMeterFill.style.width = (boss.hp / boss.maxHp * 100) + "%";
        boss.y += (4 * boss.dir); if (boss.y < 30 || boss.y > ground - 170) boss.dir *= -1;
        if (frame % 50 === 0) bossFlames.push({ x: boss.x, y: boss.y + 60, r: 15, vx: -10 });
    }

    let moveSpeed = 8 * speedMult;
    if (!boss.active && frame % 70 === 0) obstacles.push({ x: canvas.width, y: ground - 50, w: 40, h: 50 });

    obstacles.forEach((o, i) => { o.x -= moveSpeed; if (checkHit(dragon, o)) { if (immortalTimer > 0 || isDino) obstacles.splice(i,1); else gameOver(); } });
    
    if (frame % 150 === 0) {
        let types = ['speed', 'big', 'dino', 'slow'];
        fruits.push({ x: canvas.width, y: ground - 150, type: types[Math.floor(Math.random()*types.length)] });
    }
    fruits.forEach((f, i) => { f.x -= moveSpeed; if (checkHit(dragon, {x:f.x, y:f.y, w:25, h:25})) { applyFruit(f.type); fruits.splice(i,1); } });

    flames.forEach((fl, fi) => {
        fl.x += 15;
        if (boss.active && fl.x > boss.x && fl.y > boss.y && fl.y < boss.y + boss.h) { boss.hp -= 1.5; flames.splice(fi,1); if(boss.hp <= 0) { boss.active = false; score += 500; gameLevel++; } }
        obstacles.forEach((o, oi) => { if (fl.x > o.x && fl.x < o.x + o.w && fl.y > o.y) { obstacles.splice(oi,1); flames.splice(fi,1); }});
    });

    if (frame % 300 === 0 && collectedLetters.length < 7) {
        let needed = []; for(let i=0; i<7; i++) if(!collectedLetters.includes(i)) needed.push(i);
        let idx = needed[Math.floor(Math.random()*needed.length)];
        letterItems.push({ x: canvas.width, y: 150+Math.random()*150, char: targetWord[idx], idx });
    }
    letterItems.forEach((l, i) => {
        l.x -= moveSpeed;
        if (checkHit(dragon, {x:l.x, y:l.y-20, w:30, h:30})) {
            if(!collectedLetters.includes(l.idx)) collectedLetters.push(l.idx);
            letterItems.splice(i, 1); updateWordUI();
            if(collectedLetters.length === 7) { immortalTimer = 1200; statusLabel.innerText = "ONSTERFELIJK!"; }
        }
    });
    scoreElement.innerText = score;
}

function checkHit(d, o) { return d.x < o.x + (o.w||25) && d.x + (d.w*d.size) > o.x && d.y < o.y + (o.h||25) && d.y + (d.h*d.size) > o.y; }

function draw() {
    ctx.fillStyle = "#1a1a2e"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.save();
    if (shakeAmount > 0) { ctx.translate(Math.random()*shakeAmount, Math.random()*shakeAmount); shakeAmount *= 0.9; }
    
    // ONDERGROND
    ctx.fillStyle = "#333"; ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
    
    // DRAAK
    ctx.fillStyle = (immortalTimer > 0) ? "gold" : (isDino ? "#8B4513" : "#00ff41");
    ctx.fillRect(dragon.x, dragon.y, dragon.w * dragon.size, dragon.h * dragon.size);
    
    // BAAS
    if (boss.active) { ctx.fillStyle = "#a349a4"; ctx.fillRect(boss.x, boss.y, boss.w, boss.h); }
    
    // OBJECTEN
    ctx.fillStyle = "#ff2e63"; obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));
    ctx.fillStyle = "cyan"; fruits.forEach(f => ctx.fillRect(f.x, f.y, 20, 20));
    ctx.fillStyle = "white"; flames.forEach(fl => ctx.fillRect(fl.x, fl.y, 10, 10));
    ctx.fillStyle = "red"; bossFlames.forEach(bf => ctx.fillRect(bf.x, bf.y, 20, 20));
    ctx.fillStyle = "gold"; letterItems.forEach(l => { ctx.font = "bold 30px Courier"; ctx.fillText(l.char, l.x, l.y); });
    
    ctx.restore();
}

function gameOver() { gameActive = false; finalScoreElement.innerText = score; document.getElementById('gameOverScreen').style.display='flex'; }
function startGame() { document.getElementById('startScreen').style.display='none'; document.getElementById('gameOverScreen').style.display='none'; initVariables(); loop(); }

document.getElementById('realStartBtn').onclick = startGame;
document.getElementById('retryBtn').onclick = startGame;
function loop() { if(gameActive) { update(); draw(); animationId = requestAnimationFrame(loop); } }
</script>
</body>
</html>
