<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Rush by Jip & Noah</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; font-family: 'Courier New', Courier, monospace; touch-action: none; }
        canvas { display: block; }
        #landscapeMsg { display: none; position: absolute; inset: 0; background: #1a1a2e; color: white; z-index: 500; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        @media (orientation: portrait) { #landscapeMsg { display: flex; } }
        
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; z-index: 10; font-size: 14px; width: 95%; text-shadow: 1px 1px 2px black; }
        #wordDisplay { font-size: 24px; font-weight: bold; margin-bottom: 5px; letter-spacing: 5px; }
        .letter-off { color: rgba(255,255,255,0.15); }
        .letter-on { color: #f9ed69; text-shadow: 0 0 15px #f9ed69; }
        
        #bossMeterContainer { width: 150px; height: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.5); margin-top: 5px; border-radius: 5px; overflow: hidden; }
        #bossMeterFill { height: 100%; width: 0%; background: #ff4500; transition: width 0.2s; }
        
        .btn { position: absolute; bottom: 20px; width: 80px; height: 80px; background: rgba(255, 255, 255, 0.1); border: 4px solid rgba(255,255,255,0.6); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; z-index: 20; user-select: none; font-size: 12px; backdrop-filter: blur(4px); }
        #jumpBtn { left: 20px; }
        #fireBtn { right: 20px; border-color: #ff4500; color: #ff4500; }
        .btn:active { transform: scale(0.9); background: rgba(255,255,255,0.3); }
        
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; text-align: center; padding: 15px; backdrop-filter: blur(5px); }
        h1 { color: #00ff41; text-shadow: 0 0 15px #00ff41; font-size: 2.2em; margin: 0; letter-spacing: 3px; }
        
        /* GAME OVER SPECIFIEKE STIJL */
        #gameOverScreen { display: none; }
        #highScoreList { 
            margin: 5px 0; 
            max-height: 100px; 
            overflow-y: auto; 
            width: 100%; 
            max-width: 280px;
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 8px;
            border: 1px solid rgba(0,255,65,0.2);
        }
        .score-item { display: flex; justify-content: space-between; font-size: 11px; padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        #nameInputContainer {
            background: rgba(255,215,0,0.15);
            padding: 8px;
            border-radius: 8px;
            margin: 5px 0;
            border: 1px solid gold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #initialsInput { background: black; border: 2px solid gold; color: gold; font-size: 18px; text-align: center; width: 60px; text-transform: uppercase; outline: none; }
        
        button { padding: 10px 25px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; font-family: inherit; transition: 0.2s; }
        #realStartBtn { background: #00ff41; color: black; margin-top: 15px; }
        #saveScoreBtn { background: gold; color: black; padding: 5px 15px; }
        #retryBtn { background: #ff2e63; color: white; margin-top: 10px; width: 180px; }
        
        .legend { font-size: 10px; text-align: left; margin-top: 10px; line-height: 1.4; color: #ddd; max-width: 400px; background: rgba(255,255,255,0.08); padding: 10px; border-radius: 8px; border-left: 4px solid #00ff41; }
    </style>
</head>
<body>
    <div id="landscapeMsg"><h2>🔄 Draai je telefoon!</h2><p>Dragon Rush speel je liggend.</p></div>

    <div id="startScreen" class="overlay">
        <h1>DRAGON RUSH</h1>
        <h3 style="margin: 5px 0; font-size: 14px;">Jip & Noah Edition</h3>
        <p id="timeGreeting" style="color: #00e5ff; font-weight: bold; font-size: 12px; margin: 5px 0;"></p>
        <div class="legend">
            🔵 Snelheid | 🟠 Laser | 🟣 T-Rex | ⚪ Slowmo<br>
            🌈 +100 PTN | 🟢 <b>GIFTIG!</b> | ✨ <b>"MAARTEN":</b> DISCO MODE!
        </div>
        <button id="realStartBtn">START GAME</button>
    </div>

    <div id="gameOverScreen" class="overlay">
        <h1>GAME OVER</h1>
        <p style="font-size: 18px; margin: 5px 0;">Score: <span id="finalScore" style="color:#00ff41;">0</span></p>
        
        <div id="nameInputContainer" style="display:none;">
            <span style="color: gold; font-size: 11px; font-weight: bold;">TOP SCORE!</span>
            <input type="text" id="initialsInput" maxlength="3" placeholder="JIP">
            <button id="saveScoreBtn">OK</button>
        </div>

        <div id="highScoreList"></div>
        <button id="retryBtn">OPNIEUW</button>
    </div>

    <div id="ui">
        <div id="wordDisplay"></div>
        <div style="margin-bottom: 5px;">Score: <span id="score" style="color:#00ff41; font-weight:bold;">0</span></div>
        <span id="bossLabel">Boss Afstand:</span>
        <div id="bossMeterContainer"><div id="bossMeterFill"></div></div>
        <div id="statusLabel" style="margin-top:5px; font-weight:bold; color:#00ff41; font-size:16px;">Draak</div>
    </div>
    
    <div id="jumpBtn" class="btn">SPRONG</div>
    <div id="fireBtn" class="btn">VUUR</div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('score'), bossLabel = document.getElementById('bossLabel');
const bossMeterFill = document.getElementById('bossMeterFill'), finalScoreElement = document.getElementById('finalScore');
const statusLabel = document.getElementById('statusLabel'), highScoreList = document.getElementById('highScoreList');
const wordDisplay = document.getElementById('wordDisplay'), initialsInput = document.getElementById('initialsInput');

const hour = new Date().getHours();
let timeMode = "day";
let greeting = "Klaar voor de start?";
if (hour >= 22 || hour < 6) { timeMode = "night"; greeting = "Nachtbonus Actief (1.2x)!"; }
else if (hour >= 6 && hour < 10) { timeMode = "sunrise"; greeting = "Goedemorgen!"; }
else if (hour >= 18 && hour < 22) { timeMode = "sunset"; greeting = "Goedenavond!"; }
document.getElementById('timeGreeting').innerText = greeting;

let score, gameActive, frame, shakeAmount, animationId, particles = [];
let speedMult, bulletSize, isDino, powerUpTimer, hasLaser, gameLevel;
let dragon, obstacles, fruits, flames, bossFlames, boss, letterItems, stars = [], clouds = [];
let collectedLetters = [], immortalTimer = 0;
const targetWord = "MAARTEN";
const bossThreshold = 800;

let highScores = JSON.parse(localStorage.getItem('dragonRushScores')) || [{name: "JIP", score: 1200}, {name: "NOA", score: 1100}];

function resize() { 
    canvas.width = window.innerWidth; 
    canvas.height = window.innerHeight; 
    stars = []; clouds = [];
    for(let i=0; i<70; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2, p: Math.random()*0.1});
    for(let i=0; i<6; i++) clouds.push({x: Math.random()*canvas.width, y: Math.random()*180, w: 90+Math.random()*100, speed: 0.2 + Math.random()*0.3});
}
window.addEventListener('resize', resize);
resize();

function getSkyGradient() {
    if (immortalTimer > 0) {
        let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, `hsl(${(frame*10)%360}, 70%, 20%)`);
        grad.addColorStop(1, "#000");
        return grad;
    }
    let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    if (timeMode === "night") { grad.addColorStop(0, "#020205"); grad.addColorStop(1, "#0f0c29"); }
    else if (timeMode === "sunrise") { grad.addColorStop(0, "#ff5f6d"); grad.addColorStop(1, "#ffc371"); }
    else if (timeMode === "sunset") { grad.addColorStop(0, "#2c3e50"); grad.addColorStop(1, "#000000"); }
    else { grad.addColorStop(0, "#4facfe"); grad.addColorStop(1, "#00f2fe"); }
    return grad;
}

function drawMoon(x, y, radius) {
    const day = new Date().getDate();
    const phase = (day % 30) / 30; 
    ctx.save(); ctx.translate(x, y);
    let glow = ctx.createRadialGradient(0,0,0,0,0,radius*2);
    glow.addColorStop(0, 'rgba(255,255,255,0.2)'); glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(0,0,radius*2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255, 255, 255, 0.1)"; ctx.fill();
    ctx.beginPath();
    for (let i = 0; i <= 180; i++) {
        const angle = (i - 90) * (Math.PI / 180);
        const illumination = Math.cos(2 * Math.PI * phase);
        ctx.lineTo(Math.cos(angle) * radius * illumination, Math.sin(angle) * radius);
    }
    for (let i = 180; i >= 0; i--) {
        const angle = (i - 90) * (Math.PI / 180);
        ctx.lineTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
    }
    ctx.fillStyle = "#fffbe0"; ctx.shadowBlur = 20; ctx.shadowColor = "white"; ctx.fill(); ctx.restore();
}

function updateWordUI() {
    wordDisplay.innerHTML = targetWord.split('').map((l, i) => 
        `<span class="${collectedLetters.includes(i) ? 'letter-on' : 'letter-off'}">${l}</span>`
    ).join('');
}

function drawPlayer(x, y, size, dino) {
    ctx.save(); ctx.translate(x, y); ctx.scale(size, size);
    if (immortalTimer > 0) {
        ctx.fillStyle = `hsl(${frame * 15}, 100%, 60%)`;
        ctx.shadowBlur = 15; ctx.shadowColor = "white";
    } else {
        ctx.fillStyle = dino ? "#8B4513" : "#00ff41";
    }
    if (dino) {
        ctx.fillRect(10, 5, 30, 25); ctx.fillRect(10, 25, 12, 18); ctx.fillRect(-10, 30, 30, 10);
        ctx.fillStyle = "white"; ctx.fillRect(32, 10, 5, 5); ctx.fillStyle = "black"; ctx.fillRect(35, 12, 2, 2);
        if (immortalTimer == 0) ctx.fillStyle = "#5D2E0A";
        ctx.fillRect(5, 45, 8, 15); ctx.fillRect(20, 45, 8, 15);
    } else {
        ctx.fillRect(5, 10, 25, 15); ctx.fillRect(20, 2, 20, 15);
        if (immortalTimer == 0) ctx.fillStyle = "#008f11";
        ctx.fillRect(0, 5, 18, 12); ctx.fillStyle = "white"; ctx.fillRect(32, 6, 5, 5);
        ctx.fillStyle = "#ffcc00"; ctx.fillRect(22, -4, 5, 8); ctx.fillRect(30, -4, 5, 8);
    }
    ctx.restore();
}

function drawHydra(x, y) {
    ctx.save(); ctx.translate(x, y); 
    ctx.shadowBlur = 15; ctx.shadowColor = "purple";
    ctx.fillStyle = "#a349a4"; ctx.fillRect(20, 60, 60, 50);
    for (let i = 0; i < 3; i++) {
        let ox = i * 28; let oy = Math.sin(frame * 0.15 + i) * 15;
        ctx.fillRect(ox, 20 + oy, 15, 45); ctx.fillRect(ox - 5, 10 + oy, 35, 20);
        ctx.fillStyle = "yellow"; ctx.fillRect(ox + 18, 15 + oy, 6, 6);
    }
    ctx.restore();
}

function initVariables() {
    score = 0; gameActive = true; frame = 0; shakeAmount = 0;
    speedMult = 1; bulletSize = 1; isDino = false; powerUpTimer = 0; hasLaser = false; gameLevel = 1;
    dragon = { x: 80, y: 0, w: 45, h: 50, dy: 0, grav: 0.6, grounded: false, size: 1, jumpCount: 0, maxJumps: 3 };
    obstacles = []; fruits = []; flames = []; bossFlames = []; particles = []; 
    letterItems = []; collectedLetters = []; immortalTimer = 0;
    boss = { active: false, x: canvas.width - 160, y: 50, w: 130, h: 130, hp: 30, maxHp: 30, dir: 1 };
    updateWordUI();
}

function spawnExplosion(x, y, color, amount = 12) {
    for (let i = 0; i < amount; i++) particles.push({ x, y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 30, color, size: Math.random()*6+2 });
}

function handleJump() { if (gameActive && dragon.jumpCount < dragon.maxJumps) { dragon.dy = isDino ? -14 : -12; dragon.jumpCount++; dragon.grounded = false; } }
function handleFire() {
    if (!gameActive) return;
    if (hasLaser && isDino) { flames.push({ x: dragon.x + 50, y: dragon.y + 15, w: canvas.width, h: 30, type: 'laser', life: 15 }); shakeAmount = 15; }
    else if (dragon.size > 0.4 || isDino) { flames.push({ x: dragon.x + 50, y: dragon.y + 25, r: 12 * bulletSize, type: 'ball' }); if (!isDino) dragon.size -= 0.04; }
}

window.onkeydown = (e) => { if(e.code === 'Space') handleJump(); if(e.code === 'KeyF' || e.code === 'Enter') handleFire(); };
document.getElementById('jumpBtn').ontouchstart = (e) => { e.preventDefault(); handleJump(); };
document.getElementById('fireBtn').ontouchstart = (e) => { e.preventDefault(); handleFire(); };

function update() {
    if (!gameActive) return;
    frame++;
    if (frame % 60 === 0) {
        let pts = (speedMult > 1) ? 2 : 1;
        score += (timeMode === "night") ? Math.ceil(pts * 1.2) : pts;
    }

    if (powerUpTimer > 0) { powerUpTimer--; if (powerUpTimer === 0) resetPowerUps(); }
    if (immortalTimer > 0) {
        immortalTimer--;
        if (immortalTimer === 0) { collectedLetters = []; updateWordUI(); statusLabel.innerText = "Draak"; statusLabel.style.color = "#00ff41"; }
        else { statusLabel.innerText = "✨ MAARTEN MODE ✨"; statusLabel.style.color = "gold"; }
    }

    let ground = canvas.height - 50;
    // Verbeterde Snappy Physics
    let fallGrav = dragon.dy > 0 ? dragon.grav * 1.6 : dragon.grav;
    dragon.dy += fallGrav; dragon.y += dragon.dy;
    if (dragon.y + dragon.h > ground) { dragon.y = ground - dragon.h; dragon.dy = 0; dragon.grounded = true; dragon.jumpCount = 0; }

    if (boss.active) {
        bossLabel.innerText = "HYDRA HP:";
        bossMeterFill.style.width = (boss.hp / boss.maxHp * 100) + "%";
        bossMeterFill.style.backgroundColor = "#00ff41";
    } else {
        bossLabel.innerText = "Boss Aankomst:";
        bossMeterFill.style.width = ((score % bossThreshold) / bossThreshold * 100) + "%";
        bossMeterFill.style.backgroundColor = "#ff4500";
    }

    let moveSpeed = (8 + (gameLevel * 1.5)) * speedMult;
    if (score > 0 && score % bossThreshold === 0 && !boss.active) { boss.active = true; boss.hp = 30 * gameLevel; boss.maxHp = boss.hp; obstacles = []; shakeAmount = 20; }
    
    if (boss.active) {
        boss.y += (4.5 * boss.dir); if (boss.y < 30 || boss.y > ground - 170) boss.dir *= -1;
        if (frame % 55 === 0) {
            let roll = Math.random() > 0.5;
            bossFlames.push({ x: boss.x, y: roll ? ground-35 : boss.y+60, r: 18, vx: -(moveSpeed+4), roll: roll });
        }
    } else if (frame % 70 === 0) {
        obstacles.push({ x: canvas.width, y: ground - (50 + gameLevel*4), w: 40, h: 50 + gameLevel*4, hp: 2 });
    }

    stars.forEach(s => { s.x -= moveSpeed * s.p; if(s.x < 0) s.x = canvas.width; });
    clouds.forEach(c => { c.x -= moveSpeed * c.speed; if(c.x + c.w < -100) c.x = canvas.width + 100; });

    if (frame % 350 === 0 && collectedLetters.length < targetWord.length) {
        let needed = []; for (let i=0; i<targetWord.length; i++) if (!collectedLetters.includes(i)) needed.push(i);
        let idx = needed[Math.floor(Math.random() * needed.length)];
        letterItems.push({ x: canvas.width, y: 150 + Math.random() * 150, char: targetWord[idx], idx });
    }

    if (frame % 120 === 0) {
        let types = [{c:'cyan',t:'speed'},{c:'orange',t:'big'},{c:'purple',t:'dino'},{c:'white',t:'slow'},{c:'green',t:'poison'}];
        if (Math.random() < 0.15) types.push({c:'rainbow',t:'rare'});
        let pick = types[Math.floor(Math.random()*types.length)];
        fruits.push({ x: canvas.width, y: ground - 120 - Math.random()*180, type: pick.t, color: pick.c });
    }

    // Geoptimaliseerde array filtering (tegen flickering)
    letterItems = letterItems.filter(l => {
        l.x -= moveSpeed;
        if (checkHit(dragon, {x:l.x, y:l.y-20, w:30, h:30})) {
            if (!collectedLetters.includes(l.idx)) collectedLetters.push(l.idx);
            updateWordUI(); spawnExplosion(dragon.x, dragon.y, "gold", 20);
            if (collectedLetters.length === targetWord.length) { immortalTimer = 1200; shakeAmount = 30; }
            return false;
        }
        return l.x > -50;
    });

    obstacles = obstacles.filter(o => {
        o.x -= moveSpeed; 
        if (checkHit(dragon, o)) { 
            if (immortalTimer > 0) { spawnExplosion(o.x, o.y, "#e94560"); return false; } 
            else if (isDino) { resetPowerUps(); spawnExplosion(o.x, o.y, "#8B4513"); return false; } 
            else { gameOver(); return true; }
        } 
        return o.x > -100;
    });

    fruits = fruits.filter(f => {
        f.x -= moveSpeed; 
        if (checkHit(dragon, {x:f.x, y:f.y, w:25, h:25})) { 
            if(f.type==='poison' && immortalTimer == 0) gameOver(); 
            if(f.type==='rare') score+=100; 
            applyFruit(f.type); score+=10; return false;
        } 
        return f.x > -100;
    });

    bossFlames = bossFlames.filter(bf => {
        bf.x += bf.vx; 
        if (checkHit(dragon, {x: bf.x-bf.r, y: bf.y-bf.r, w: bf.r*2, h: bf.r*2})) { 
            if (immortalTimer > 0 || isDino) { if(isDino && immortalTimer==0) resetPowerUps(); return false; } 
            else { gameOver(); return true; }
        } 
        return bf.x > -100;
    });

    flames = flames.filter(fl => {
        if (fl.type === 'ball') {
            fl.x += 15; let hitObstacle = false;
            obstacles.forEach(o => {
                if (fl.x > o.x && fl.x < o.x + o.w && fl.y > o.y && fl.y < o.y + o.h) {
                    if(bulletSize > 1) o.hp=0; else o.hp--; hitObstacle = true;
                    if (o.hp <= 0) { spawnExplosion(o.x, o.y, "#e94560"); o.dead = true; }
                }
            });
            obstacles = obstacles.filter(o => !o.dead);
            if (boss.active && fl.x > boss.x && fl.x < boss.x + boss.w && fl.y > boss.y && fl.y < boss.y + boss.h) { boss.hp -= 1.2; hitObstacle = true; if(boss.hp <= 0) winBoss(); }
            return !hitObstacle && fl.x < canvas.width;
        } else {
            fl.life--; obstacles.forEach(o => { if (o.x < fl.x + fl.w && fl.y > o.y && fl.y < o.y + o.h) { spawnExplosion(o.x, o.y, "white", 5); o.dead = true; } });
            obstacles = obstacles.filter(o => !o.dead);
            if (boss.active && fl.y > boss.y && fl.y < boss.y + boss.h) { boss.hp -= 1; if(boss.hp <= 0) winBoss(); }
            return fl.life > 0;
        }
    });
    
    particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; p.life--; return p.life > 0; });
    scoreElement.innerText = score;
}

function applyFruit(type) {
    if(type === 'rare' || type === 'poison') return;
    let oldDino = isDino; resetPowerUps(); isDino = oldDino;
    if (type === 'speed') speedMult = 1.8;
    else if (type === 'big') { if(isDino) hasLaser = true; else bulletSize = 3.5; }
    else if (type === 'dino') { isDino = true; statusLabel.innerText = "T-REX MODE"; statusLabel.style.color = "#8B4513"; powerUpTimer = 9999; return; }
    else if (type === 'slow') speedMult = 0.5;
    powerUpTimer = 450;
}

function resetPowerUps() { speedMult = 1; bulletSize = 1; isDino = false; hasLaser = false; dragon.size = 1; if(immortalTimer == 0) { statusLabel.innerText = "Draak"; statusLabel.style.color = "#00ff41"; } }
function winBoss() { spawnExplosion(boss.x+60, boss.y+60, "purple", 50); boss.active = false; gameLevel++; score += 500; shakeAmount = 35; }

function checkHit(d, o) { 
    let pad = 10; let dW = (d.w * d.size) - pad, dH = (d.h * d.size) - pad; 
    return d.x + (pad/2) < o.x + (o.w||25) && d.x + (pad/2) + dW > o.x && d.y + (pad/2) < o.y + (o.h||25) && d.y + (pad/2) + dH > o.y; 
}

function draw() {
    ctx.fillStyle = getSkyGradient(); ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (timeMode === "night" || timeMode === "sunset" || immortalTimer > 0) {
        ctx.fillStyle = immortalTimer > 0 ? `hsl(${(frame*20)%360}, 100%, 80%)` : "white";
        stars.forEach(s => { ctx.fillRect(s.x, s.y, s.s, s.s); });
        if (immortalTimer === 0) drawMoon(canvas.width - 120, 100, 40);
    }
    if (timeMode === "day" || timeMode === "sunrise") {
        ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
        clouds.forEach(c => { ctx.beginPath(); ctx.ellipse(c.x, c.y, c.w/2, 25, 0, 0, 7); ctx.fill(); });
    }
    ctx.save(); if (shakeAmount > 0) { ctx.translate(Math.random()*shakeAmount - shakeAmount/2, Math.random()*shakeAmount - shakeAmount/2); shakeAmount *= 0.9; }
    ctx.fillStyle = "#222"; ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
    ctx.fillStyle = "#333"; ctx.fillRect(0, canvas.height - 50, canvas.width, 4);
    drawPlayer(dragon.x, dragon.y, dragon.size, isDino);
    if (boss.active) drawHydra(boss.x, boss.y);
    obstacles.forEach(o => { ctx.fillStyle = (o.hp==1) ? "#555" : "#ff2e63"; ctx.fillRect(o.x, o.y, o.w, o.h); });
    fruits.forEach(f => { ctx.fillStyle = f.type==='rare' ? `hsl(${(frame*10)%360},100%,50%)` : f.color; ctx.beginPath(); ctx.arc(f.x+15, f.y+15, 14, 0, 7); ctx.fill(); });
    letterItems.forEach(l => { ctx.fillStyle = "gold"; ctx.font = "bold 32px Courier"; ctx.shadowBlur = 15; ctx.shadowColor = "gold"; ctx.fillText(l.char, l.x, l.y); ctx.shadowBlur = 0; });
    flames.forEach(fl => { if (fl.type === 'ball') { ctx.fillStyle = "#ffcc00"; ctx.beginPath(); ctx.arc(fl.x, fl.y, fl.r, 0, 7); ctx.fill(); } else { ctx.fillStyle = "white"; ctx.shadowBlur=20; ctx.shadowColor="cyan"; ctx.fillRect(fl.x, fl.y, fl.w, fl.h); } });
    particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = p.life/30; ctx.fillRect(p.x, p.y, p.size, p.size); });
    ctx.globalAlpha = 1; bossFlames.forEach(bf => { ctx.fillStyle = "#ff416c"; ctx.beginPath(); ctx.arc(bf.x, bf.y, bf.r, 0, 7); ctx.fill(); });
    ctx.restore();
}

function gameOver() { 
    gameActive = false; finalScoreElement.innerText = score; 
    document.getElementById('gameOverScreen').style.display='flex';
    const minScore = highScores.length < 10 ? 0 : highScores[highScores.length-1].score;
    document.getElementById('nameInputContainer').style.display = score > minScore ? 'flex' : 'none';
    updateHighScoreDisplay();
}

function updateHighScoreDisplay() {
    highScoreList.innerHTML = '<div style="color:#888; font-size:10px; margin-bottom:5px;">TOP 10 HALL OF FAME</div>';
    highScores.slice(0, 10).forEach((s, i) => { highScoreList.innerHTML += `<div class="score-item"><span>${i+1}. ${s.name}</span><span>${s.score}</span></div>`; });
}

document.getElementById('saveScoreBtn').onclick = () => {
    const name = initialsInput.value.toUpperCase() || "???";
    highScores.push({name, score}); highScores.sort((a,b)=>b.score-a.score);
    highScores = highScores.slice(0,10); localStorage.setItem('dragonRushScores', JSON.stringify(highScores));
    document.getElementById('nameInputContainer').style.display='none'; updateHighScoreDisplay();
};

function startGame() { 
    document.getElementById('startScreen').style.display='none'; document.getElementById('gameOverScreen').style.display='none'; 
    initVariables(); loop(); 
}
document.getElementById('realStartBtn').onclick = startGame;
document.getElementById('retryBtn').onclick = startGame;

function loop() { if(gameActive) { update(); draw(); animationId = requestAnimationFrame(loop); } }
</script>
</body>
</html>
